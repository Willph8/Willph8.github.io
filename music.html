<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Godiyakum - Music</title>
    <link rel="stylesheet" href="styling.css">
    <style>
        /* Specific styling for internal pages */
        .content-body {
            padding: 40px;
            color: white;
            font-family: sans-serif;
        }
        .back-btn {
            display: inline-block;
            margin-bottom: 20px;
            color: var(--netflix-red);
            text-decoration: none;
            font-weight: bold;
            border: 1px solid var(--netflix-red);
            padding: 8px 15px;
            border-radius: 4px;
            transition: 0.3s;
        }
        .back-btn:hover {
            background: var(--netflix-red);
            color: white;
        }
    </style>
</head>
<body style="display: block; overflow-y: auto;"> <div class="content-body">
        <a href="index.html" class="back-btn">← Back to Menu</a>
        
        <h1 style="color: var(--netflix-red);">Music Library</h1>
        <p>Your premium audio collection lives here.</p>
        
        <div class="track-grid">
             <div class="track-card">Trending Track A</div>
             <div class="track-card">Trending Track B</div>
             <div class="track-card">Trending Track C</div>
             <div class="track-card">Trending Track D</div>
        </div>
    </div>

</body>
</html>
