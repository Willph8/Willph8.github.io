<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Godiyakum - Music</title>
    <link rel="stylesheet" href="styling.css">
    <style>
        :root {
            --spotify-green: #1DB954;
            --spotify-black: #121212;
            --spotify-light-black: #181818;
            --spotify-gray: #b3b3b3;
            --spotify-hover: #282828;
        }

        body {
            background-color: var(--spotify-black);
            color: white;
            font-family: 'Circular', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }

        .content-body {
            max-width: 1000px;
            margin: 0 auto;
        }

        /* --- SPOTIFY HEADER --- */
        .header-container {
            display: flex;
            align-items: flex-end;
            gap: 20px;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #282828;
        }

        .header-container h1 {
            font-size: 3rem;
            margin: 0;
            letter-spacing: -2px;
        }

        .back-btn {
            color: var(--spotify-gray);
            text-decoration: none;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
            display: inline-block;
        }

        .back-btn:hover { color: white; }

        /* --- TRACK LIST (SPOTIFY STYLE) --- */
        .track-list {
            display: flex;
            flex-direction: column;
            width: 100%;
        }

        .track-row {
            display: grid;
            grid-template-columns: 50px 1fr 100px 150px;
            align-items: center;
            padding: 10px 16px;
            border-radius: 4px;
            transition: background 0.3s ease;
            cursor: pointer;
        }

        .track-row:hover {
            background-color: var(--spotify-hover);
        }

        .track-number {
            color: var(--spotify-gray);
            font-variant-numeric: tabular-nums;
        }

        .track-info-main {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .album-art {
            width: 40px;
            height: 40px;
            background: #282828;
            border-radius: 4px;
            object-fit: cover;
        }

        .text-details h3 {
            margin: 0;
            font-size: 1rem;
            font-weight: 400;
        }

        .text-details p {
            margin: 0;
            font-size: 0.85rem;
            color: var(--spotify-gray);
        }

        .badge-exclusive {
            color: var(--spotify-green);
            font-size: 0.7rem;
            font-weight: bold;
            border: 1px solid var(--spotify-green);
            padding: 2px 6px;
            border-radius: 3px;
            text-transform: uppercase;
        }

        /* --- BUTTONS --- */
        .play-icon-btn {
            background: none;
            border: none;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            visibility: hidden; /* Only show on hover like Spotify */
        }

        .track-row:hover .play-icon-btn {
            visibility: visible;
        }

        .track-row:hover .track-number {
            display: none;
        }

        .download-link {
            color: var(--spotify-gray);
            text-decoration: none;
            font-size: 0.8rem;
        }

        .download-link:hover {
            color: white;
            text-decoration: underline;
        }

    </style>
</head>
<body>

    <div class="content-body">
        <a href="index.html" class="back-btn">← Home</a>
        
        <div class="header-container">
            <h1>Music Library</h1>
        </div>

        <div class="track-row" style="border-bottom: 1px solid #282828; cursor: default; color: var(--spotify-gray); font-size: 0.8rem; text-transform: uppercase;">
            <span>#</span>
            <span>Title</span>
            <span>Status</span>
            <span style="text-align: right; padding-right: 15px;">Action</span>
        </div>

        <div class="track-list">
            
            <div class="track-row" data-track-id="1">
                <span class="track-number">1</span>
                <button class="play-icon-btn">▶</button>
                <div class="track-info-main">
                    <img src="https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?w=50" class="album-art">
                    <div class="text-details">
                        <h3>New Energy (Godiyakum Mix)</h3>
                        <p>Godiyakum Records • Demo</p>
                    </div>
                </div>
                <div><span class="badge-exclusive">Exclusive</span></div>
                <div style="text-align: right;">
                    <a href="demo-track.mp3" download class="download-link">Download</a>
                </div>
                <audio id="audio-1" src="demo-track.mp3"></audio>
            </div>

            <div class="track-row" data-track-id="2">
                <span class="track-number">2</span>
                <button class="play-icon-btn">▶</button>
                <div class="track-info-main">
                    <img src="https://images.unsplash.com/photo-1470225620780-dba8ba36b745?w=50" class="album-art">
                    <div class="text-details">
                        <h3>Late Night Vibes</h3>
                        <p>Godiyakum Records • Original</p>
                    </div>
                </div>
                <div></div>
                <div style="text-align: right;">
                    <a href="#" class="download-link">Download</a>
                </div>
                <audio id="audio-2" src="track2.mp3"></audio>
            </div>

            <div class="track-row" data-track-id="3">
                <span class="track-number">3</span>
                <button class="play-icon-btn">▶</button>
                <div class="track-info-main">
                    <img src="https://images.unsplash.com/photo-1493225255756-d9584f8606e9?w=50" class="album-art">
                    <div class="text-details">
                        <h3>Afro-Sunset</h3>
                        <p>Godiyakum Records • Instrumental</p>
                    </div>
                </div>
                <div><span class="badge-exclusive">Exclusive</span></div>
                <div style="text-align: right;">
                    <a href="#" class="download-link">Download</a>
                </div>
                <audio id="audio-3" src="track3.mp3"></audio>
            </div>

        </div>
    </div>

    <script>
        // Handle playing multiple tracks independently
        const trackRows = document.querySelectorAll('.track-row[data-track-id]');
        
        trackRows.forEach(row => {
            const trackId = row.getAttribute('data-track-id');
            const audio = document.getElementById(`audio-${trackId}`);
            const playBtn = row.querySelector('.play-icon-btn');

            row.addEventListener('click', (e) => {
                // Don't trigger play if clicking the download link
                if (e.target.classList.contains('download-link')) return;

                if (audio.paused) {
                    // Pause all other audios first (Spotify behavior)
                    document.querySelectorAll('audio').forEach(a => a.pause());
                    document.querySelectorAll('.play-icon-btn').forEach(b => b.textContent = '▶');
                    
                    audio.play();
                    playBtn.textContent = '⏸';
                } else {
                    audio.pause();
                    playBtn.textContent = '▶';
                }
            });
        });
    </script>
</body>
</html>
