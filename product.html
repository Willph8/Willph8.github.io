<!DOCTYPE html>
<html>
<head>
<style>
  body { background: #000; color: white; font-family: sans-serif; padding: 20px; }
  .container { max-width: 800px; margin: auto; display: flex; gap: 40px; }
  .detail-img { width: 400px; height: 400px; background: #333; border-radius: 15px; }
  .info { flex: 1; }
  .price { color: #00ff88; font-size: 32px; font-weight: bold; }
  .buy-btn { 
    background: #E50914; color: white; border: none; 
    padding: 15px 30px; font-size: 18px; border-radius: 30px; 
    cursor: pointer; width: 100%; margin-top: 20px;
  }
  .back-link { color: #ccc; text-decoration: none; display: block; margin-bottom: 20px; }
.sidebar {
    position: fixed;
    top: 0;
    right: -100%; /* Start completely off-screen */
    width: 350px;
    height: 100%;
    background: #1a1a1a;
    z-index: 2000;
    transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: -10px 0 30px rgba(0,0,0,0.5);
    display: flex;
    flex-direction: column;
}

/* When this class is added via JS, the sidebar slides in */
.sidebar.active {
    right: 0;
}

#cart-overlay.active {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.7);
    z-index: 1999;
}

</style>
</head>
<body>

  <a href="index.html" class="back-link">← Back to GodiyakumGo</a>

  <div class="container" id="product-details">
    <!-- Content will be loaded by JavaScript -->
    <p>Loading product...</p>
  </div>


<!-- The Sidebar Container -->
<div id="cart-sidebar" class="sidebar">
    <div class="sidebar-header">
        <h2>Your Basket</h2>
        <button onclick="closeCart()" class="close-btn">&times;</button>
    </div>
    
    <!-- This div is where JS will 'inject' the products -->
    <div id="cart-items-container"></div>

    <div class="sidebar-footer">
        <hr>
        <div class="total-row">
            <span>Total:</span>
            <span id="cart-total">R 0.00</span>
        </div>
        <button class="checkout-btn" onclick="checkout()">Checkout via WhatsApp</button>
    </div>
</div>

<!-- Dark overlay that appears when cart is open -->
<div id="cart-overlay" onclick="closeCart()"></div>




  <script>
    async function loadDetail() {
      // 1. Get the ID from the URL (?id=1)
      const params = new URLSearchParams(window.location.search);
      const productId = params.get('id');

      // 2. Fetch the same JSON file
      const response = await fetch('products.json');
      const products = await response.json();

      // 3. Find the product that matches the ID
      const item = products.find(p => p.id == productId);

      if (item) {
        document.getElementById('product-details').innerHTML = `
          <div class="detail-img" style="background-image: url('${item.image}'); background-size: cover;"></div>
          <div class="info">
            <h1>${item.name}</h1>
            <p class="price">${item.price}</p>
            <p>Category: ${item.category}</p>
            <p style="color: #aaa;">Free shipping to South Africa. High quality guaranteed.</p>
            <button class="buy-btn" onclick="addToCart(${item.id})">Add to Cart</button>
          </div>
        `;
      }
    }

    function addToCart(id) {
        alert("Item " + id + " added to cart! (We will build the cart next)");
    }

    loadDetail();

    // item is the object we found earlier in your loadDetail function
    cart.push(item); 
    renderCart();
    alert("Added to cart!");
}

// 1. Open/Close Functions
function openCart() {
    document.getElementById('cart-sidebar').classList.add('active');
    document.getElementById('cart-overlay').classList.add('active');
    renderCart(); // Refresh the list of items
}

function closeCart() {
    document.getElementById('cart-sidebar').classList.remove('active');
    document.getElementById('cart-overlay').classList.remove('active');
}

// 2. The Rendering Logic
function renderCart() {
    const container = document.getElementById('cart-items-container');
    const totalElement = document.getElementById('cart-total');
    
    // Get items from browser memory
    let cart = JSON.parse(localStorage.getItem('godiyakum_cart')) || [];
    
    container.innerHTML = ''; // Clear old list
    let total = 0;

    if (cart.length === 0) {
        container.innerHTML = '<p style="text-align:center; margin-top:50px;">Your cart is empty</p>';
    } else {
        cart.forEach((item, index) => {
            total += parseFloat(item.price.replace('R ', '').replace(',', ''));
            container.innerHTML += `
                <div class="cart-item" style="display:flex; justify-content:space-between; padding:15px; border-bottom:1px solid #333;">
                    <div>
                        <p style="margin:0; font-weight:bold;">${item.name}</p>
                        <p style="margin:0; color:#00ff88;">${item.price}</p>
                    </div>
                    <button onclick="removeItem(${index})" style="color:red; background:none; border:none; cursor:pointer;">Remove</button>
                </div>
            `;
        });
    }
    totalElement.innerText = `R ${total.toFixed(2)}`;
}

function removeItem(index) {
    let cart = JSON.parse(localStorage.getItem('godiyakum_cart')) || [];
    cart.splice(index, 1); // Remove item from array
    localStorage.setItem('godiyakum_cart', JSON.stringify(cart)); // Save back to memory
    renderCart(); // Update UI
}



  </script>
</body>
</html>
