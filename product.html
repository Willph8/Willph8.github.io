<!DOCTYPE html>
<html>
<head>
<style>
  :root {
    --n-red: #E50914;
    --n-dark: #8b0000;
    --card-bg: #1a1a1a;
  }

  body {
    background-color: #000;
    margin: 0;
    min-height: 100vh;
    font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    color: white;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* --- HEADER & NAVIGATION --- */
  .back-nav {
    width: 100%;
    padding: 20px;
    max-width: 1000px;
  }
  .back-link {
    color: #ccc;
    text-decoration: none;
    font-weight: bold;
    transition: 0.3s;
  }
  .back-link:hover { color: var(--n-red); }

  /* --- PRODUCT DETAIL LAYOUT --- */
  .product-container {
    display: flex;
    flex-wrap: wrap;
    gap: 40px;
    width: 90%;
    max-width: 1000px;
    margin-top: 20px;
  }

  .detail-img {
    flex: 1;
    min-width: 300px;
    height: 450px;
    background: #333;
    border-radius: 15px;
    background-size: cover;
    background-position: center;
    border: 1px solid #333;
  }

  .info-panel {
    flex: 1;
    min-width: 300px;
  }

  .info-panel h1 { font-size: 36px; margin-bottom: 10px; }
  .price-tag { color: #00ff88; font-size: 32px; font-weight: bold; margin-bottom: 20px; }
  .category-tag { background: #333; padding: 5px 15px; border-radius: 20px; font-size: 12px; }

  .buy-btn {
    background: var(--n-red);
    color: white;
    border: none;
    padding: 18px;
    width: 100%;
    border-radius: 10px;
    font-size: 18px;
    font-weight: bold;
    cursor: pointer;
    margin-top: 30px;
    transition: 0.3s;
  }
  .buy-btn:hover { background: var(--n-dark); transform: scale(1.02); }

  /* --- SHARED CART UI --- */
  #cart-icon { position: fixed; top: 20px; right: 20px; background: var(--n-red); padding: 15px; border-radius: 50%; cursor: pointer; z-index: 1001; }
  #cart-count { background: white; color: black; font-size: 12px; padding: 2px 6px; border-radius: 10px; position: absolute; top: 5px; right: 5px; font-weight: bold;}

  .sidebar {
    position: fixed; top: 0; right: -400px; width: 350px; height: 100%;
    background: #111; z-index: 2000; transition: 0.4s;
    box-shadow: -10px 0 30px rgba(0,0,0,0.5); display: flex; flex-direction: column;
  }
  .sidebar.active { right: 0; }
  .sidebar-header { padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; }
  #cart-items-container { flex: 1; overflow-y: auto; padding: 10px; }
  .sidebar-footer { padding: 20px; border-top: 1px solid #333; }
  .checkout-btn { background: #25D366; color: white; width: 100%; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
  #cart-overlay.active { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1999; }

  @media (max-width: 600px) {
    .detail-img { height: 300px; }
  }
</style>
</head>
<body>

  <div class="back-nav">
    <a href="index.html" class="back-link">← Back to GodiyakumGo</a>
  </div>

  <div class="product-container" id="product-details">
    <!-- Content injected by JS -->
    <p>Loading product details...</p>
  </div>

  <!-- CART COMPONENTS -->
  <div id="cart-icon" onclick="openCart()">
    🛒 <span id="cart-count">0</span>
  </div>

  <div id="cart-sidebar" class="sidebar">
    <div class="sidebar-header">
      <h2>Your Basket</h2>
      <button onclick="closeCart()" style="background:none; color:white; border:none; font-size:24px; cursor:pointer;">&times;</button>
    </div>
    <div id="cart-items-container"></div>
    <div class="sidebar-footer">
      <h3 style="display:flex; justify-content:space-between;">Total: <span id="cart-total">R 0.00</span></h3>
      <button class="checkout-btn" onclick="checkout()">Order via WhatsApp</button>
    </div>
  </div>
  <div id="cart-overlay" onclick="closeCart()"></div>

<script>
  let currentItem = null;

  // 1. LOAD PRODUCT DATA
  async function loadDetail() {
    const params = new URLSearchParams(window.location.search);
    const productId = params.get('id');

    try {
      const response = await fetch('products.json');
      const products = await response.json();
      currentItem = products.find(p => p.id == productId);

      if (currentItem) {
        document.getElementById('product-details').innerHTML = `
          <div class="detail-img" style="background-image: url('${currentItem.image}')"></div>
          <div class="info-panel">
            <span class="category-tag">${currentItem.category}</span>
            <h1>${currentItem.name}</h1>
            <p class="price-tag">${currentItem.price}</p>
            <p style="color:#aaa; line-height:1.6;">Premium quality item. Fast delivery across South Africa. Secure your order now through GodiyakumGo.</p>
            <button class="buy-btn" onclick="addToCart()">Add to Basket</button>
          </div>
        `;
      } else {
        document.getElementById('product-details').innerHTML = "<h1>Product not found.</h1>";
      }
    } catch (e) { console.error("Error:", e); }
  }

  // 2. ADD TO CART LOGIC
  function addToCart() {
    if (currentItem) {
      let cart = JSON.parse(localStorage.getItem('godiyakum_cart')) || [];
      cart.push(currentItem);
      localStorage.setItem('godiyakum_cart', JSON.stringify(cart));
      renderCart();
      openCart(); // Slide the sidebar open automatically
    }
  }

  // 3. CART UI LOGIC (Matches index.html)
  function openCart() {
    document.getElementById('cart-sidebar').classList.add('active');
    document.getElementById('cart-overlay').classList.add('active');
    renderCart();
  }

  function closeCart() {
    document.getElementById('cart-sidebar').classList.remove('active');
    document.getElementById('cart-overlay').classList.remove('active');
  }

  function renderCart() {
    const container = document.getElementById('cart-items-container');
    const totalDisplay = document.getElementById('cart-total');
    const countDisplay = document.getElementById('cart-count');
    let cart = JSON.parse(localStorage.getItem('godiyakum_cart')) || [];
    
    countDisplay.innerText = cart.length;
    container.innerHTML = cart.length === 0 ? '<p style="text-align:center; padding:20px;">Empty</p>' : '';
    
    let total = 0;
    cart.forEach((item, index) => {
      total += parseFloat(item.price.replace(/[^\d.]/g, ''));
      container.innerHTML += `
        <div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #333;">
          <div><b>${item.name}</b><br><span style="color:#00ff88">${item.price}</span></div>
          <button onclick="removeItem(${index})" style="background:none; color:red; border:none; cursor:pointer;">&times;</button>
        </div>`;
    });
    totalDisplay.innerText = `R ${total.toFixed(2)}`;
  }

  function removeItem(index) {
    let cart = JSON.parse(localStorage.getItem('godiyakum_cart')) || [];
    cart.splice(index, 1);
    localStorage.setItem('godiyakum_cart', JSON.stringify(cart));
    renderCart();
  }

  function checkout() {
    let cart = JSON.parse(localStorage.getItem('godiyakum_cart')) || [];
    if (cart.length === 0) return alert("Empty!");
    let msg = "Order from GodiyakumGo:\n" + cart.map(i => `- ${i.name} (${i.price})`).join('\n');
    window.open(`https://wa.me/+27711593188?text=${encodeURIComponent(msg)}`, '_blank');
  }

  // Initialize
  loadDetail();
  renderCart();
</script>

</body>
</html>
