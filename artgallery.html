<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Godiyakum - Music</title>
    <link rel="stylesheet" href="styling.css">
    <style>
        /* Specific styling for internal pages */
        .content-body {
            padding: 40px;
            color: white;
            font-family: sans-serif;
        }
        .back-btn {
            display: inline-block;
            margin-bottom: 20px;
            color: var(--netflix-red);
            text-decoration: none;
            font-weight: bold;
            border: 1px solid var(--netflix-red);
            padding: 8px 15px;
            border-radius: 4px;
            transition: 0.3s;
        }
        .back-btn:hover {
            background: var(--netflix-red);
            color: white;
        }
    .gallery-container {
  padding: 20px;
  max-width: 1200px;
  margin: 0 auto;
  text-align: center;
}

.gallery-header h1 {
  font-size: 2rem;
  color: #fff;
  margin-bottom: 5px;
}

.gallery-header p {
  color: #888;
  margin-bottom: 30px;
}

/* The Grid Layout */
.art-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
}

/* Individual Art Cards */
.art-card {
  position: relative;
  border-radius: 15px;
  overflow: hidden;
  background: #1a1a1a;
  height: 300px; /* Fixed height for consistency */
  border: 1px solid #333;
  cursor: pointer;
  transition: transform 0.3s ease;
}

.art-card img {
  width: 100%;
  height: 100%;
  object-fit: cover; /* This keeps images from stretching */
  transition: transform 0.5s ease;
}

/* Overlay that appears on hover */
.art-overlay {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  background: linear-gradient(transparent, rgba(0,0,0,0.8));
  color: white;
  padding: 20px;
  opacity: 0;
  transition: opacity 0.3s ease;
  display: flex;
  align-items: flex-end;
  justify-content: center;
}

.art-card:hover {
  transform: translateY(-5px);
}

.art-card:hover img {
  transform: scale(1.1);
}

.art-card:hover .art-overlay {
  opacity: 1;
}

.back-link {
  display: inline-block;
  margin-top: 40px;
  color: #888;
  text-decoration: none;
  font-size: 0.9rem;
}

.back-link:hover {
  color: #fff;
}

    @keyframes fadeInUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.art-card {
  animation: fadeInUp 0.6s ease forwards;
}
/* The Lightbox Background */
.lightbox {
  display: none; /* Hidden by default */
  position: fixed;
  z-index: 1000;
  padding-top: 50px;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  background-color: rgba(0, 0, 0, 0.95); /* Darker than the page */
  overflow: auto;
}

/* The Actual Image */
.lightbox-content {
  margin: auto;
  display: block;
  max-width: 90%;
  max-height: 80vh;
  border-radius: 10px;
  box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
  animation: zoomIn 0.3s ease;
}

/* Close Button */
.close-btn {
  position: absolute;
  top: 20px;
  right: 35px;
  color: #fff;
  font-size: 40px;
  font-weight: bold;
  cursor: pointer;
}

/* Caption Text */
#caption {
  margin: auto;
  display: block;
  width: 80%;
  text-align: center;
  color: #ccc;
  padding: 20px 0;
  font-family: sans-serif;
}

@keyframes zoomIn {
  from {transform: scale(0.5); opacity: 0;}
  to {transform: scale(1); opacity: 1;}
}

    </style>
</head>
<body style="display: block; overflow-y: auto;"> <div class="content-body">
        <a href="index.html" class="back-btn">← Back to Menu</a>
        
      <div class="gallery-container">
  <div class="gallery-header">
    <h1>Visuals by Godiyakum</h1>
    <p>Exclusive Art & Concept Designs</p>
  </div>

  <div class="art-grid">
    <div class="art-card">
      <img src="art1.jpg" alt="Godiyakum Art">
      <div class="art-overlay">
        <span>Godiyakum Records</span>
      </div>
    </div>

    <div class="art-card">
      <img src="art2.jpg" alt="Godiyakum Art">
      <div class="art-overlay">
        <span>Concept Alpha</span>
      </div>
    </div>

    <div class="art-card">
      <img src="art3.jpg" alt="Godiyakum Art">
      <div class="art-overlay">
        <span>Summer Session</span>
      </div>
    </div>
    
    </div>
  
  <a href="index.html" class="back-link">← Back Home</a>
</div>
<div id="lightbox" class="lightbox">
  <span class="close-btn">&times;</span>
  <img class="lightbox-content" id="lightbox-img">
  <div id="caption"></div>
</div>

    <script>
    
    document.addEventListener("DOMContentLoaded", function() {
  const lightbox = document.getElementById("lightbox");
  const lightboxImg = document.getElementById("lightbox-img");
  const captionText = document.getElementById("caption");
  const closeBtn = document.querySelector(".close-btn");

  // Select all images inside your art cards
  const images = document.querySelectorAll(".art-card img");

  images.forEach(img => {
    img.onclick = function() {
      lightbox.style.display = "block";
      lightboxImg.src = this.src;
      // Use the alt text or the overlay text as the caption
      captionText.innerHTML = this.alt;
    }
  });

  // Close when clicking the 'X'
  closeBtn.onclick = function() {
    lightbox.style.display = "none";
  }

  // Close when clicking outside the image
  lightbox.onclick = function(event) {
    if (event.target === lightbox) {
      lightbox.style.display = "none";
    }
  }
});

    
    </script>
</body>
</html>
