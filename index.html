<!DOCTYPE html>
<html>
<head>
<style>
  :root {
    --n-red: #E50914;
    --n-dark: #8b0000;
    --card-bg: #1a1a1a;
  }

  body {
    background-color: #000;
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    color: white;
    overflow-x: hidden;
  }

  /* --- ANIMATION STYLES --- */
  #intro-container {
    position: fixed;
    top: 0; left: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    width: 100%;
    height: 100%;
    z-index: 3000;
    background: #000;
  }

  .word-wrapper {
    display: flex;
    perspective: 1200px;
    transform-style: preserve-3d;
    animation: finalDive 1.5s forwards 8s;
  }

  .letter {
    font-size: 80px;
    font-family: 'Arial Black', sans-serif;
    color: var(--n-red);
    opacity: 0;
    background: linear-gradient(to bottom, var(--n-red), var(--n-dark));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: letterIn 1s forwards cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }

  /* Letter Timings */
  .l1 { animation-delay: 0.2s; } .l2 { animation-delay: 0.4s; }
  .l3 { animation-delay: 0.6s; } .l4 { animation-delay: 0.8s; }
  .l5 { animation-delay: 1.0s; } .l6 { animation-delay: 1.2s; }
  .l7 { animation-delay: 1.4s; } .l8 { animation-delay: 1.6s; }
  .l9 { animation-delay: 1.8s; } .l10 { animation-delay: 2.0s; }
  .l11 { animation-delay: 2.2s; }

  @keyframes letterIn { 0% { transform: translateZ(-500px) scale(0); opacity: 0; } 100% { transform: translateZ(0) scale(1); opacity: 1; } }
  @keyframes finalDive { 100% { transform: scale(60); opacity: 0; visibility: hidden; } }

  /* --- SEARCH & STOREFRONT INTERFACE --- */
  #search-interface {
    display: none; 
    flex-direction: column;
    align-items: center;
    width: 100%;
    padding: 80px 20px 40px 20px;
    opacity: 0;
    animation: fadeIn 1s forwards;
  }

  .logo-small {
    font-size: 42px;
    font-family: 'Arial Black', sans-serif;
    margin-bottom: 25px;
    background: linear-gradient(to right, var(--n-red), #ff4d4d);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .search-box {
    width: 90%;
    max-width: 600px;
    background: #fff;
    border-radius: 50px;
    padding: 5px 10px 5px 25px;
    display: flex;
    align-items: center;
    box-shadow: 0 4px 15px rgba(229, 9, 20, 0.3);
    margin-bottom: 50px;
  }

  .search-box input { flex: 1; border: none; outline: none; font-size: 16px; color: #333; }

  .search-btn { background: var(--n-red); color: white; border: none; padding: 12px 25px; border-radius: 40px; cursor: pointer; font-weight: bold; }

  /* --- PRODUCT GRID --- */
  .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; width: 90%; max-width: 1000px; }
  .product-card { background: var(--card-bg); border-radius: 12px; overflow: hidden; transition: transform 0.3s; border: 1px solid #333; }
  .product-card:hover { transform: translateY(-5px); border-color: var(--n-red); }
  .product-img { width: 100%; height: 180px; background: #333; display: flex; align-items: center; justify-content: center; background-size: cover; }
  .product-info { padding: 15px; }
  .price { color: #00ff88; font-size: 18px; font-weight: bold; }

  /* --- CART UI --- */
  #cart-icon { position: fixed; top: 20px; right: 20px; background: var(--n-red); padding: 15px; border-radius: 50%; cursor: pointer; z-index: 1001; }
  #cart-count { background: white; color: black; font-size: 12px; padding: 2px 6px; border-radius: 10px; position: absolute; top: 5px; right: 5px; font-weight: bold;}

  .sidebar {
    position: fixed; top: 0; right: -400px; width: 350px; height: 100%;
    background: #111; z-index: 2000; transition: 0.4s;
    box-shadow: -10px 0 30px rgba(0,0,0,0.5); display: flex; flex-direction: column;
  }
  .sidebar.active { right: 0; }
  .sidebar-header { padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; }
  #cart-items-container { flex: 1; overflow-y: auto; padding: 10px; }
  .sidebar-footer { padding: 20px; border-top: 1px solid #333; }
  .checkout-btn { background: #25D366; color: white; width: 100%; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
  
  #cart-overlay.active { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1999; }

  @keyframes fadeIn { to { opacity: 1; } }
</style>
</head>
<body>

  <!-- 1. INTRO -->
  <div id="intro-container">
    <div class="word-wrapper">
      <span class="letter l1">G</span><span class="letter l2">o</span>
      <span class="letter l3">d</span><span class="letter l4">i</span>
      <span class="letter l5">y</span><span class="letter l6">a</span>
      <span class="letter l7">k</span><span class="letter l8">u</span>
      <span class="letter l9">m</span><span class="letter l10">G</span>
      <span class="letter l11">o</span>
    </div>
  </div>

  <!-- 2. MAIN STORE -->
  <div id="search-interface">
    <h1 class="logo-small">GodiyakumGo</h1>
    <div class="search-box">
      <input type="text" placeholder="Search brands, products, deals...">
      <button class="search-btn">Search</button>
    </div>
    <div class="product-grid" id="product-grid"></div>
  </div>

  <!-- 3. CART COMPONENTS -->
  <div id="cart-icon" onclick="openCart()">
    🛒 <span id="cart-count">0</span>
  </div>

  <div id="cart-sidebar" class="sidebar">
    <div class="sidebar-header">
      <h2>Your Basket</h2>
      <button onclick="closeCart()" style="background:none; color:white; border:none; font-size:24px; cursor:pointer;">&times;</button>
    </div>
    <div id="cart-items-container"></div>
    <div class="sidebar-footer">
      <h3 style="display:flex; justify-content:space-between;">Total: <span id="cart-total">R 0.00</span></h3>
      <button class="checkout-btn" onclick="checkout()">Order via WhatsApp</button>
    </div>
  </div>
  <div id="cart-overlay" onclick="closeCart()"></div>

<script>
  // --- CORE LOGIC ---
  const hasSeenIntro = localStorage.getItem('visitedBefore');

  window.onload = () => {
    if (hasSeenIntro) {
      showStore();
    } else {
      setTimeout(() => {
        showStore();
        localStorage.setItem('visitedBefore', 'true');
      }, 9500);
    }
    renderCart();
  };

  function showStore() {
    document.getElementById('intro-container').style.display = 'none';
    document.getElementById('search-interface').style.display = 'flex';
    document.body.style.overflowY = "auto";
    loadProducts();
  }

  // --- PRODUCT LOGIC ---
  async function loadProducts() {
    try {
      const response = await fetch('products.json');
      const products = await response.json();
      const grid = document.getElementById('product-grid');
      grid.innerHTML = products.map(item => `
        <a href="product.html?id=${item.id}" style="text-decoration: none; color: inherit;">
          <div class="product-card">
            <div class="product-img" style="background-image: url('${item.image}')"></div>
            <div class="product-info">
              <div class="price">${item.price}</div>
              <div class="name">${item.name}</div>
            </div>
          </div>
        </a>
      `).join('');
    } catch (e) { console.error("Error loading products:", e); }
  }

  // --- CART LOGIC ---
  function openCart() {
    document.getElementById('cart-sidebar').classList.add('active');
    document.getElementById('cart-overlay').classList.add('active');
    renderCart();
  }

  function closeCart() {
    document.getElementById('cart-sidebar').classList.remove('active');
    document.getElementById('cart-overlay').classList.remove('active');
  }

  function renderCart() {
    const container = document.getElementById('cart-items-container');
    const totalDisplay = document.getElementById('cart-total');
    const countDisplay = document.getElementById('cart-count');
    let cart = JSON.parse(localStorage.getItem('godiyakum_cart')) || [];
    
    countDisplay.innerText = cart.length;
    container.innerHTML = cart.length === 0 ? '<p style="text-align:center; padding:20px;">Empty</p>' : '';
    
    let total = 0;
    cart.forEach((item, index) => {
      total += parseFloat(item.price.replace(/[^\d.]/g, ''));
      container.innerHTML += `
        <div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #333;">
          <div><b>${item.name}</b><br><span style="color:#00ff88">${item.price}</span></div>
          <button onclick="removeItem(${index})" style="background:none; color:red; border:none; cursor:pointer;">&times;</button>
        </div>`;
    });
    totalDisplay.innerText = `R ${total.toFixed(2)}`;
  }

  function removeItem(index) {
    let cart = JSON.parse(localStorage.getItem('godiyakum_cart')) || [];
    cart.splice(index, 1);
    localStorage.setItem('godiyakum_cart', JSON.stringify(cart));
    renderCart();
  }

  function checkout() {
    let cart = JSON.parse(localStorage.getItem('godiyakum_cart')) || [];
    if (cart.length === 0) return alert("Empty!");
    let msg = "Order from GodiyakumGo:\n" + cart.map(i => `- ${i.name} (${i.price})`).join('\n');
    window.open(`https://wa.me/27711593188?text=${encodeURIComponent(msg)}`, '_blank');
  }
</script>
</body>
</html>
