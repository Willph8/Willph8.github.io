    /* --- SIDEBAR STYLING --- */
    .sidebar {
      height: 100%;
      width: 0;
      position: fixed;
      z-index: 2000; /* Above everything */
      top: 0;
      left: 0;
      background-color: #111;
      overflow-x: hidden;
      transition: 0.4s;
      padding-top: 60px;
      box-shadow: 2px 0px 10px rgba(0,0,0,0.5);
    }

    .sidebar a {
      padding: 15px 25px;
      text-decoration: none;
      font-size: 1.2rem;
      color: #818181;
      display: block;
      transition: 0.3s;
      font-family: sans-serif;
    }

    .sidebar a:hover {
      color: #f1f1f1;
      background: #222;
    }

    .sidebar .closebtn {
      position: absolute;
      top: 10px;
      right: 25px;
      font-size: 36px;
      margin-left: 50px;
      cursor: pointer;
    }

    .menu-trigger {
      font-size: 24px;
      cursor: pointer;
      color: white;
      margin-right: 15px;
    }

    header {
      display: flex;
      align-items: center;
      padding: 10px 20px;
    }
    
    /* Ensure the mini-logo stays flexible */
    .mini-logo { flex-grow: 1; }
  </style>
</head>

 <div id="story-modal" class="story-modal hidden">

    </div>

    </div>

<script>
/* SIDEBAR FUNCTIONS */
function openNav() {
  document.getElementById("mySidebar").style.width = "250px";
}

function closeNav() {
  document.getElementById("mySidebar").style.width = "0";
}

document.addEventListener("DOMContentLoaded", function() {
    const intro = document.querySelector('.viewport-center');
    const home = document.getElementById('home-screen');
    const modal = document.getElementById('story-modal');
    const closeBtn = document.querySelector('.close-story');
    const storyImg = document.getElementById('active-story-img');
    const bgBlur = document.getElementById('story-bg-blur');
    const progressContainer = document.getElementById('progress-container');
    const stories = document.querySelectorAll('.story-thumb');
    const composerInput = document.getElementById('composer-input');
    const newsFeed = document.querySelector('.news-feed');
    
    let currentIndex = 0;
    let storyTimeout;

    if (sessionStorage.getItem("viewedIntro")) {
        intro.style.display = 'none';
        home.classList.remove('hidden');
    } else {
        sessionStorage.setItem("viewedIntro", "true");
        setTimeout(() => {
            intro.style.opacity = '0';
            setTimeout(() => {
                intro.style.display = 'none';
                home.classList.remove('hidden');
                home.classList.add('fade-in');
            }, 1000);
        }, 4500);
    }

    stories.forEach((story, index) => {
        story.addEventListener('click', () => {
            currentIndex = index;
            showStory(currentIndex);
            modal.classList.remove('hidden');
        });
    });

    function showStory(index) {
        clearTimeout(storyTimeout);
        const imgPath = stories[index].querySelector('img').src;
        storyImg.src = imgPath;
        bgBlur.style.backgroundImage = `url('${imgPath}')`;

        progressContainer.innerHTML = '';
        stories.forEach((_, i) => {
            const segment = document.createElement('div');
            segment.className = 'progress-segment' + (i < index ? ' seen-segment' : '') + (i === index ? ' active-segment' : '');
            const inner = document.createElement('div');
            inner.className = 'progress-inner';
            segment.appendChild(inner);
            progressContainer.appendChild(segment);
            
            if (stories[index].classList.contains('live')) {
                document.getElementById('live-viewer-count').classList.remove('hidden');
                document.getElementById('viewer-number').innerText = Math.floor(Math.random() * (1500 - 800) + 800);
            } else {
                document.getElementById('live-viewer-count').classList.add('hidden');
            }
        });

        storyTimeout = setTimeout(nextStory, 5000);
    }

    function nextStory() {
        currentIndex < stories.length - 1 ? showStory(++currentIndex) : closeStory();
    }

    function closeStory() {
        modal.classList.add('hidden');
        clearTimeout(storyTimeout);
    }

    composerInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && composerInput.value.trim() !== "") {
            const post = document.createElement('div');
            post.className = 'feed-post fade-in';
            post.innerHTML = `<div class="post-content"><p>${composerInput.value}</p></div>`;
            newsFeed.prepend(post);
            composerInput.value = "";
        }
    });

    document.getElementById('nav-right').addEventListener('click', nextStory);
    document.getElementById('nav-left').addEventListener('click', () => currentIndex > 0 && showStory(--currentIndex));
    closeBtn.addEventListener('click', closeStory);
});

const trackCards = document.querySelectorAll('.track-card');
const miniPlayer = document.getElementById('mini-player');
const playBtn = document.querySelector('.play-pause-btn');

trackCards.forEach(card => {
    card.addEventListener('click', (e) => {
        e.preventDefault(); 
        miniPlayer.classList.remove('hidden');
        miniPlayer.classList.add('fade-in');
        const songName = card.textContent.replace(/[0-9]/g, '').trim();
        document.querySelector('.song-title').innerText = songName;
    });
});

let isPlaying = false;
playBtn.addEventListener('click', () => {
    isPlaying = !isPlaying;
    playBtn.innerText = isPlaying ? '⏸' : '▶';
});
</script>
</body>
